<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repair</title>
  <!-- 引入Bootstrap图标 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- 引入Bootstrap样式 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Vue CDN -->
  <script src="https://unpkg.com/vue@2.7.16/dist/vue.js"></script>
  <!-- 模拟axios用于接口请求 -->
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
  <style>
    a {
      text-decoration: none;
    }
    /* 禁用状态样式 */
    .ban-select {
      background-color: #e9ecef !important;
      cursor: not-allowed !important;
      opacity: 0.7;
    }
    /* 下拉箭头旋转 */
    .filter-btn-span-active {
      transform: rotate(180deg);
      transition: transform 0.3s ease;
    }
    .filter-btn-span {
      transition: transform 0.3s ease;
      margin-right: 5px;
    }

    .color-white {
      color: white !important;
    }
    .color-333 {
      color: #333 !important;
    }
    .bg-price {
      background-color: #ef7204 !important;
    }
    .cursor-pointer {
      cursor: pointer;
      padding: 8px 0;
      width: 100%;
    }
    .cursor-pointer:hover {
      color: #ef7204 !important;
    }
    .isotope-filters-list1 {
      list-style: none;
      padding: 0;
      margin: 0;
      background-color: white;
    }
    .isotope-filters-list1 li {
      padding: 5px 0;
    }
    .isotope-filters-list-wrap1 {
  position: absolute;
  padding-bottom: 4px;
  z-index: 20;
}
.bg-Primary1 {
  background-color: #396A3C !important;
}

.filter-btn {
  margin-top: 0;
  vertical-align: middle;
  flex-direction: row-reverse;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  padding: 1px 15px;
  font-size: 12px;
  line-height: 2;
  color: #151515;
  background-color: transparent;
  border-color: #151515;
  position: relative;
  overflow: hidden;
  border: 2px solid;
  border-radius: 6px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  white-space: nowrap;
  text-overflow: ellipsis;
  text-align: center;
  user-select: none;
  transition: all 250ms ease-in-out;
  outline: none;
}
.filter-btn-span {
  transition: transform 0.25s ease;
  margin-left: 5px;
  position: relative;
  display: inline-block;
  color: inherit;
  font-size: 14px;
  line-height: 1;
  position: relative;
  display: inline-block;
  font-weight: 400;
  font-style: normal;
  speak: none;
  text-transform: none;
}
.filter-btn-span-active {
  transform: rotate(180deg);
}
.rq-slide-element {
  max-height: 200px;
  overflow-y: auto; /* 确保垂直滚动条在内容溢出时显示 */
  scrollbar-width: thin; /* 对于支持的浏览器（如Firefox）设置滚动条宽度 */
}
/* WebKit浏览器（Chrome、Safari等）的滚动条样式 */
.rq-slide-element::-webkit-scrollbar {
  width: 6px; /* 垂直滚动条宽度 */
}
.rq-slide-element::-webkit-scrollbar-track {
  background: #f1f1f1; /* 滚动条轨道背景色 */
  border-radius: 3px;
}
.rq-slide-element::-webkit-scrollbar-thumb {
  background: #ccc; /* 滚动条滑块颜色 */
  border-radius: 3px;
}
.rq-slide-element::-webkit-scrollbar-thumb:hover {
  background: #aaa; /* 鼠标悬停时滑块颜色 */
}
  </style>
</head>
<body>
  <div id="app">
    <div >
      <div class="container">
        <div class="position-relative w-100" style="top: 0">
          <div class="w-100" style="top: 0">
            <!-- 选择表单页面 -->
            <div  class="row m-0 align-items-center justify-content-center w-100 m-0 px-0 py-3">
              <div class="col-xl-5 col-lg-8 col-12 bg-Primary1">
                <div class="w-100 py-5 " style="border-radius: 1rem !important">
                  <div class="w-100 text-center">
                    <div class="h2 alert-link color-white">
                      <span style="color: #ef7204">FAST</span> REPAIRS
                    </div>
                    <div class="h2 alert-link color-white">WHILE YOU WAIT</div>
                  </div>
                  
                  <!-- 大类选择 -->
                  <button id="index1" class="filter-btn w-100 py-2 bg-white"
                    style="border-width: 0px;display: block;word-wrap: break-word;word-break: break-all;"
                    @click="categoryNameClick()">
                    <span class="bi bi-chevron-down filter-btn-span"
                      :class="filterCategoryShow ? 'filter-btn-span-active' : ''"></span>
                    {{ categoryName }}
                  </button>
                  <div  id="index2" v-if="filterCategoryShow" class="isotope-filters-list-wrap1 rounded-sm  mt-1 col-xl-5 col-lg-8 col-12" style="padding-right: 24px;">
                    <ul class="isotope-filters-list1 rounded  rq-slide-element"
                      :class="filterCategoryShow ? 'filters-active' : ''" style="max-height: 200px;overflow-y: scroll;">
                      <li v-for="(item, index) in category" :key="index" @click="categoryChange(item)"
                        class="d-flex justify-content-center">
                        <a class="cursor-pointer color-333"
                          style="display: block;word-wrap: break-word;word-break: break-all;padding-left: 20px;">{{ item.name }}</a>
                      </li>
                    </ul>
                  </div>

                  <!-- 小类选择 - 修复1：增加minorCanSelectList非空校验 -->
                  <button 
                    class="filter-btn w-100 py-2 bg-white mt-3" 
                    :class="(categoryId && minorCanSelectList.length) ? '' : 'ban-select'"
                    style="border-width: 0px;display: block;word-wrap: break-word;word-break: break-all;"
                    @click="filterMinorCategoryClick()"
                    :disabled="!(categoryId && minorCanSelectList.length)"
                  >
                    <span class="bi bi-chevron-down filter-btn-span" :class="
                        filterMinorCategoryShow ? 'filter-btn-span-active' : ''
                      "></span>
                    {{ minorCategoryName }}
                  </button>
                  <div v-if="filterMinorCategoryShow && categoryId && minorCanSelectList.length"
                    class="isotope-filters-list-wrap1 rounded-sm  mt-1 col-xl-5 col-lg-8 col-12"  style="padding-right: 24px;">
                    <ul class="isotope-filters-list1 rounded   rq-slide-element"
                      :class="filterMinorCategoryShow ? 'filters-active' : ''"
                      style="max-height: 200px;overflow-y: scroll;">
                      <li v-for="(item, index) in minorCanSelectList" :key="index" @click="minorCategoryChange(item)"
                        class="d-flex justify-content-center"
                        style="display: block;word-wrap: break-word;word-break: break-all;">
                        <a class="cursor-pointer color-333" style="padding-left: 20px;">{{ item.name }}</a>
                      </li>
                    </ul>
                  </div>

                  <!-- 问题选择 -->
                  <button :class="(minorCategoryId && issueList.length) ? '' : 'ban-select'" class="filter-btn w-100 py-2 bg-white mt-3"
                    style="border-width: 0px;display: block;word-wrap: break-word;word-break: break-all;"
                    @click="issueListClick()"
                    :disabled="!(minorCategoryId && issueList.length)"
                  >
                    <span class="bi bi-chevron-down filter-btn-span"
                      :class="issueListShow ? 'filter-btn-span-active' : ''"></span>
                    {{ issueListName }}
                  </button>
                  <div v-if="issueListShow && minorCategoryId && issueList.length" class="isotope-filters-list-wrap1 rounded-sm mt-1  col-xl-5 col-lg-8 col-12"
                    style="padding-right: 24px;">
                    <ul class="isotope-filters-list1 rounded   rq-slide-element"
                      :class="issueListShow ? 'filters-active' : ''" style="max-height: 200px;overflow-y: scroll;">
                      <li v-for="(item, index) in issueList" :key="index" @click="issueChange(item)"
                        class="d-flex justify-content-center"
                        style="display: block;word-wrap: break-word;word-break: break-all;">
                        <a class="cursor-pointer color-333"  style="padding-left: 20px;">{{ item.name }}</a>
                      </li>
                    </ul>
                  </div>

                  <!-- 获取报价按钮 -->
                  <button class="s-btn rounded-lg w-100 font-weight-bold mt-3 bg-price" 
                    :disabled="!currentIssue.price"
                    style="font-size: 1.3rem; color: #fff;    flex-wrap: wrap;border: none;padding: 10px 0;">
                    (${{ currentIssue.price }})
                  </button>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    Vue.prototype.$toast = {
      error: function(msg) {
        alert(msg);
      },
      success: function(msg) {
        alert(msg);
      }
    };

    // 创建Vue实例
    new Vue({
      el: '#app',
      data() {
        return {
          filterCategoryShow: false,
          filterMinorCategoryShow: false,
          categoryName: "Select Brand",
          minorCategoryName: "Select Model",
          filterMinorCategoryKey: 0,
          issueListShow: false,
          issueListName: "Select Issue",
          price: 0,
          category: [],
          minorCategory: [],
          minorCanSelectList: [],
          issueList: [],
          issueId: null,
          categoryId: null,
          minorCategoryId: null,
          currentIssue: {
            name:'',
            price:0,
            time:''
          },
          issueSelectList: [],
          allList:[],
          // 原始JSON数据
          rawData: []
          
          // [
          //   {
          //     "brand": "Apple iPhone",
          //     "model": "iPhone SE 3",
          //     "issue": "Back Glass Replacement",
          //     "price": "99",
          //     "time": "30 minutes to 2 hours"
          //   }, 
          //   {
          //     "brand": "Apple iPhone",
          //     "model": "iPhone 8",
          //     "issue": "Back Glass Replacement",
          //     "price": "991",
          //     "time": "30 minutes to 2 hours"
          //   }
          // ]
        };
      },
      mounted() {
        this.initData();
      },
      methods: {
        // 初始化数据
        initData() {
          let that = this;
          fetch('./data.json')
          .then(res => res.json())
          .then(data => {
            this.rawData = data
            // 处理原始数据，转换为分类结构
            this.processRawData();
          }
          )
          // this.processRawData();
        },
        
        // 处理原始JSON数据，构建分类、型号、问题的层级结构
        processRawData() {
          // 1. 提取所有品牌（大类）
          const brandMap = {};
          this.rawData.forEach(item => {
            if (!brandMap[item.brand]) {
              brandMap[item.brand] = {
                id: Date.now() + Math.floor(Math.random() * 1000), // 生成唯一ID
                name: item.brand,
                sort: 1
              };
            }
          });
          this.category = Object.values(brandMap);
          
          // 2. 提取所有型号（小类）
          const modelMap = {};
          this.rawData.forEach(item => {
            const brandId = this.category.find(c => c.name === item.brand).id;
            const modelKey = `${item.brand}_${item.model}`;
            
            if (!modelMap[modelKey]) {
              modelMap[modelKey] = {
                id: Date.now() + Math.floor(Math.random() * 10000), // 生成唯一ID
                name: item.model,
                parentId: brandId,
                sort: 1
              };
            }
          });
          this.minorCategory = Object.values(modelMap);
          
          // 3. 提取所有问题
          const issueMap = {};
          this.rawData.forEach(item => {
            const brandId = this.category.find(c => c.name === item.brand).id;
            const modelKey = `${item.brand}_${item.model}`;
            const modelId = this.minorCategory.find(m => m.name === item.model && m.parentId === brandId).id;
            const issueKey = `${modelId}_${item.issue}`;
            
            if (!issueMap[issueKey]) {
              issueMap[issueKey] = {
                id: Date.now() + Math.floor(Math.random() * 100000), // 生成唯一ID
                name: item.issue,
                parentId: modelId,
                price: parseInt(item.price),
                time: item.time,
                sort: 1
              };
            }
          });
          
          this.allList = Object.values(issueMap);
          console.log('处理后的数据结构：', {
            brands: this.category,
            models: this.minorCategory,
            issues: this.allList
          });
        },
        
        // 大类选择变更 - 修复3：彻底重置小类/问题状态，优化小类筛选逻辑
        categoryChange(bean) {
          this.price = 0;
          this.filterCategoryShow = false;
          this.categoryId = bean.id;
          this.categoryName = bean.name;
          
          // 彻底重置小类相关状态
          this.minorCategoryId = null;
          this.minorCategoryName = "Select Model";
          this.minorCanSelectList = [];
          
          // 彻底重置问题相关状态
          this.issueId = null;
          this.issueListName = "Select Issue";
          this.issueList = [];
          this.currentIssue = { name:'', price:0, time:'' };
          
          // 筛选当前大类下的小类
          this.minorCanSelectList = this.minorCategory
            .filter(item => item.parentId === bean.id)
            .sort((a,b) => a.sort - b.sort);
          
          this.filterMinorCategoryKey += 1;
          
          // 提示：如果当前大类无小类，给出提示
          if (this.minorCanSelectList.length === 0) {
            this.$toast.error(`No models found for ${bean.name}`);
          }
        },
        
        // 小类选择变更
        minorCategoryChange(bean) {
          let that = this;
          this.price = 0;
          this.filterMinorCategoryShow = false;
          this.minorCategoryId = bean.id;
          this.minorCategoryName = bean.name;
          
          // 重置问题相关状态
          this.issueId = null;
          this.issueListName = "Select Issue";
          this.currentIssue = { name:'', price:0, time:'' };
          
          // 筛选当前型号下的所有问题
          this.issueList = this.allList
            .filter(item => item.parentId === bean.id)
            .sort((a,b) => a.sort - b.sort);
          
          // 提示：如果当前型号无问题，给出提示
          if (this.issueList.length === 0) {
            this.$toast.error(`No issues found for ${bean.name}`);
          }
        },
        
        // 问题选择变更
        issueChange(bean) {
          this.issueListShow = false;
          this.issueId = bean.id;
          this.price = bean.price;
          this.issueListName = bean.name;
          this.currentIssue = bean;
        },
        
        // 大类下拉框点击
        categoryNameClick(){
          this.filterCategoryShow = !this.filterCategoryShow;
          this.filterMinorCategoryShow = false;
          this.issueListShow = false;
        },
        
        // 小类下拉框点击 - 修复4：增加数据校验，避免空列表展开
        filterMinorCategoryClick(){
          if (!this.categoryId || this.minorCanSelectList.length === 0) {
            this.$toast.error("Please select a brand first (or no models available)");
            return;
          }
          this.filterMinorCategoryShow = !this.filterMinorCategoryShow;
          this.issueListShow = false;
          this.filterCategoryShow = false;
        },
        
        // 问题下拉框点击 - 增加数据校验
        issueListClick(){
          if (!this.minorCategoryId || this.issueList.length === 0) {
            this.$toast.error("Please select a model first (or no issues available)");
            return;
          }
          this.issueListShow = !this.issueListShow;
          this.filterMinorCategoryShow = false;
          this.filterCategoryShow = false;
        },
      }
    });
  </script>
</body>
</html>
